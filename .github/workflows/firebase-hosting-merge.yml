name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths:
      - .github\workflows\firebase-hosting-merge.yml
      - lib/**/*
      - web/**/*
      - pubspec.*
      - firebase.json
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Set firebase api key
        run: |
          sed 's/FIREBASE_API_KEY/${{ secrets.FIREBASE_API_KEY_YUKYUCHECKER }}/' \
            -i lib/firebase.dart
      - name: Install dependencies
        run: flutter pub get
      - name: Build web
        run: flutter build web --release --wasm
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YUKYUCHECKER }}
          channelId: live
          projectId: yukyuchecker
