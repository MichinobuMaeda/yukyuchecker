name: Deploy to Firebase Functions on merge
on:
  push:
    branches:
      - main
    paths:
      - .github\workflows\firebase-functions-merge.yml
      - functions/**
      - .nvmrc
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      - run: npm ci && npm --prefix functions ci && npm --prefix functions run build
      - name: Deploy Functions
        env:
          WORK_DIR: ${{ runner.temp }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/service-account.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_YUKYUCHECKER }}' \
          > $GOOGLE_APPLICATION_CREDENTIALS
          npx firebase deploy --only functions
