name: Deploy to Firebase Firestore Rules on merge
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/firebase-firestore-merge.yml
      - firebase.json
      - firestore.rules
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      - run: npm ci
      - name: Deploy Firestore
        env:
          WORK_DIR: ${{ runner.temp }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/service-account.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_YUKYUCHECKER }}' \
          > $GOOGLE_APPLICATION_CREDENTIALS
          npx firebase deploy --only firestore
