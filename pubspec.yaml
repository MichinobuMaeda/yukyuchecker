name: yukyuchecker
description: "Yukyu Checker"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1
environment:
  sdk: ^3.11.1
dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.5.0
  flutter_native_splash: ^2.4.7
  firebase_auth: ^6.2.0
  cloud_functions: ^6.0.7
  cloud_firestore: ^6.1.3
  fpdart: ^1.2.0
  shared_preferences: ^2.5.4
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true

